<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" role="img" aria-label="Borja">
  <title>Borja</title>

  <!-- Neck (skin between jaw and collar) -->
  <rect x="12.5" y="17.5" width="5" height="4" fill="#F0C8A3"/>

  <!-- Blazer (navy jacket, matches real Borja's outfit) -->
  <path d="M2 36
           L 2 26
           Q 2 22, 7 21
           L 11 20.5
           L 15 26
           L 19 20.5
           L 23 21
           Q 28 22, 28 26
           L 28 36 Z"
        fill="#1F2937"/>

  <!-- Inner crew-neck shirt visible through V-opening -->
  <path d="M11 20.5 L 15 26 L 19 20.5 L 17 22 L 15 24.5 L 13 22 Z"
        fill="#0F1419"/>

  <!-- Subtle lapel center line -->
  <path d="M15 26 L 15 36"
        stroke="#111827" stroke-width="0.5" opacity="0.7" fill="none"/>

  <!-- Raised right arm: sleeve (blazer color) -->
  <path d="M19.5 20.5 L 23 20.5 L 26.5 11 L 24 11 Z"
        fill="#1F2937"/>

  <!-- Raised right arm: forearm (skin emerging from cuff) -->
  <path d="M24 11 L 26.5 11 L 29 6 L 26.5 6 Z"
        fill="#F0C8A3"/>

  <!-- Hand: open palm waving hello -->
  <ellipse cx="28.5" cy="4.5" rx="3" ry="3.2" fill="#F0C8A3"/>

  <!-- Thumb (left side of palm) -->
  <ellipse cx="25.8" cy="5.5" rx="1.1" ry="1.4" fill="#F0C8A3"/>

  <!-- Finger separation hints on the palm -->
  <path d="M27 1.7 L 27 4.3"
        stroke="#E0B388" stroke-width="0.3" opacity="0.55" fill="none"/>
  <path d="M28.3 1.3 L 28.3 4.3"
        stroke="#E0B388" stroke-width="0.3" opacity="0.55" fill="none"/>
  <path d="M29.6 1.3 L 29.6 4.3"
        stroke="#E0B388" stroke-width="0.3" opacity="0.55" fill="none"/>
  <path d="M30.8 1.7 L 30.8 4.3"
        stroke="#E0B388" stroke-width="0.3" opacity="0.55" fill="none"/>

  <!-- Bald head, light skin -->
  <ellipse cx="15" cy="11" rx="7" ry="7.5" fill="#F0C8A3"/>

  <!-- Bald crown highlight -->
  <ellipse cx="15" cy="6.5" rx="4" ry="1.2" fill="#FCE0C2" opacity="0.75"/>

  <!-- Soft skin shadow under crown -->
  <path d="M9 9.5 Q 15 11, 21 9.5 Q 21 11, 15 11.5 Q 9 11, 9 9.5 Z"
        fill="#E0B388" opacity="0.3"/>

  <!-- Mustache: horizontal bar above the lip with slight middle dip -->
  <path d="M10 13.5
           Q 12.5 13, 15 13.4
           Q 17.5 13, 20 13.5
           Q 19.3 14.7, 17.3 14.6
           Q 15 14.3, 12.7 14.6
           Q 10.7 14.7, 10 13.5 Z"
        fill="#2F1F17"/>

  <!-- Mustache-to-goatee corner connectors (frames the mouth) -->
  <path d="M10.7 14.5 Q 10.7 15.6, 12 16.3"
        stroke="#2F1F17" stroke-width="1" fill="none" stroke-linecap="round"/>
  <path d="M19.3 14.5 Q 19.3 15.6, 18 16.3"
        stroke="#2F1F17" stroke-width="1" fill="none" stroke-linecap="round"/>

  <!-- Goatee: chin beard teardrop below the lip -->
  <path d="M12 16.3
           Q 13.5 17, 15 17
           Q 16.5 17, 18 16.3
           Q 18 18.2, 16.5 18.7
           Q 15 19, 13.5 18.7
           Q 12 18.2, 12 16.3 Z"
        fill="#2F1F17"/>

  <!-- Eyes -->
  <circle cx="12" cy="10.5" r="0.85" fill="#1F140E"/>
  <circle cx="18" cy="10.5" r="0.85" fill="#1F140E"/>

  <!-- Eyebrows -->
  <path d="M10 9 L 13.2 8.6"
        stroke="#2F1F17" stroke-width="0.9" stroke-linecap="round" fill="none"/>
  <path d="M16.8 8.6 L 20 9"
        stroke="#2F1F17" stroke-width="0.9" stroke-linecap="round" fill="none"/>

  <!-- Subtle smile crease in the goatee -->
  <path d="M13 17.8 Q 15 18.3, 17 17.8"
        stroke="#F0C8A3" stroke-width="0.4" fill="none" opacity="0.4"/>
</svg>
