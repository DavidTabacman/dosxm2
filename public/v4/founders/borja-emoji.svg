<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" role="img" aria-label="Borja">
  <title>Borja</title>
  <!-- Bald head, light skin -->
  <ellipse cx="18" cy="17" rx="11" ry="13" fill="#F0C8A3"/>
  <!-- Subtle highlight on the bald crown so it reads as bald -->
  <ellipse cx="18" cy="10" rx="7" ry="2" fill="#FCE0C2" opacity="0.7"/>
  <!-- Soft skin shadow under the crown -->
  <path d="M9 14 Q18 18 27 14 Q27 17 18 18 Q9 17 9 14 Z" fill="#E0B388" opacity="0.35"/>
  <!-- Beard wrapping jaw and cheeks -->
  <path d="M7 16
           C 7 22, 9 28, 18 30
           C 27 28, 29 22, 29 16
           C 27.5 20, 24 22, 22 22
           C 20.5 21, 19.5 21, 18 21
           C 16.5 21, 15.5 21, 14 22
           C 12 22, 8.5 20, 7 16 Z"
        fill="#2F1F17"/>
  <!-- Mustache -->
  <path d="M11.5 17.5
           Q 14.5 20, 18 20
           Q 21.5 20, 24.5 17.5
           Q 23 19, 21 19.2
           Q 19.5 19.5, 18 19.5
           Q 16.5 19.5, 15 19.2
           Q 13 19, 11.5 17.5 Z"
        fill="#1F140E"/>
  <!-- Eyes -->
  <circle cx="14" cy="14.5" r="1" fill="#1F140E"/>
  <circle cx="22" cy="14.5" r="1" fill="#1F140E"/>
  <!-- Eyebrows -->
  <path d="M11.5 12 L16 11.5" stroke="#2F1F17" stroke-width="1" stroke-linecap="round" fill="none"/>
  <path d="M20 11.5 L24.5 12" stroke="#2F1F17" stroke-width="1" stroke-linecap="round" fill="none"/>
  <!-- Smile crease in beard -->
  <path d="M15 22 Q 18 23 21 22" stroke="#F0C8A3" stroke-width="0.5" fill="none" opacity="0.45"/>
</svg>
